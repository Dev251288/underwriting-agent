<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f6fb"/>
    </linearGradient>
    <linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="dash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="42" font-size="24" font-weight="700" fill="#0f172a" text-anchor="middle">Mortgage Underwriting Pipeline — 7 agents, 1 human decision</text>
  <text x="600" y="68" font-size="14" fill="#64748b" text-anchor="middle">Sequential pipeline · cost gate at 2b · human-in-the-loop at step 6</text>

  <!-- Uploaded files -->
  <g filter="url(#shadow)">
    <rect x="40" y="120" width="170" height="80" rx="10" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="125" y="148" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">Uploaded files</text>
    <text x="125" y="170" font-size="11" fill="#64748b" text-anchor="middle">Aadhaar · PAN · Form 16</text>
    <text x="125" y="186" font-size="11" fill="#64748b" text-anchor="middle">Salary slips · Bank · Deed</text>
  </g>

  <!-- Agent 1 -->
  <g filter="url(#shadow)">
    <rect x="260" y="120" width="170" height="80" rx="10" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="345" y="143" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">AGENT 1</text>
    <text x="345" y="163" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">DocumentCollector</text>
    <text x="345" y="184" font-size="11" fill="#64748b" text-anchor="middle">Classify &amp; catalogue</text>
  </g>

  <!-- Agent 2 -->
  <g filter="url(#shadow)">
    <rect x="480" y="120" width="170" height="80" rx="10" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="565" y="143" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">AGENT 2</text>
    <text x="565" y="163" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">DocumentAuthenticator</text>
    <text x="565" y="184" font-size="11" fill="#64748b" text-anchor="middle">Per-doc authenticity check</text>
  </g>

  <!-- Agent 2b: cost gate -->
  <g filter="url(#shadow)">
    <rect x="700" y="120" width="180" height="80" rx="10" fill="url(#gate)" stroke="#f59e0b"/>
    <text x="790" y="143" font-size="11" font-weight="700" fill="#b45309" text-anchor="middle">AGENT 2b · COST GATE</text>
    <text x="790" y="163" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">ConsistencyChecker</text>
    <text x="790" y="184" font-size="11" fill="#7c2d12" text-anchor="middle">go / no-go before paid APIs</text>
  </g>

  <!-- Arrow from uploads to agent 1 -->
  <line x1="215" y1="160" x2="255" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="435" y1="160" x2="475" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="655" y1="160" x2="695" y2="160" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- no-go branch -->
  <path d="M790 205 L790 270 L260 270 L260 318" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="490" y="262" font-size="11" font-weight="600" fill="#dc2626" text-anchor="middle">no_go · skip paid APIs · request corrected docs</text>

  <!-- go branch -->
  <path d="M885 160 L920 160 L920 360 L905 360" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="956" y="240" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">go</text>

  <!-- External API agents row (3, 4, 5) -->
  <g filter="url(#shadow)">
    <rect x="720" y="320" width="170" height="80" rx="10" fill="url(#api)" stroke="#10b981"/>
    <text x="805" y="343" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">AGENT 3</text>
    <text x="805" y="363" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">KYCVerifier</text>
    <text x="805" y="384" font-size="11" fill="#065f46" text-anchor="middle">Aadhaar · PAN</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="320" width="170" height="80" rx="10" fill="url(#api)" stroke="#10b981"/>
    <text x="585" y="343" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">AGENT 4</text>
    <text x="585" y="363" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">FinancialVerifier</text>
    <text x="585" y="384" font-size="11" fill="#065f46" text-anchor="middle">CIBIL · Account Aggregator</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="280" y="320" width="170" height="80" rx="10" fill="url(#api)" stroke="#10b981"/>
    <text x="365" y="343" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">AGENT 5</text>
    <text x="365" y="363" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">PropertyVerifier</text>
    <text x="365" y="384" font-size="11" fill="#065f46" text-anchor="middle">Registry · Field valuation</text>
  </g>

  <!-- arrows 3 → 4 → 5 -->
  <line x1="715" y1="360" x2="675" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="495" y1="360" x2="455" y2="360" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent 6: dashboard compiler -->
  <g filter="url(#shadow)">
    <rect x="280" y="460" width="180" height="80" rx="10" fill="url(#dash)" stroke="#6366f1"/>
    <text x="370" y="483" font-size="11" font-weight="700" fill="#4338ca" text-anchor="middle">AGENT 6</text>
    <text x="370" y="503" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">DashboardCompiler</text>
    <text x="370" y="524" font-size="11" fill="#4338ca" text-anchor="middle">Synthesise · risk · conditions</text>
  </g>

  <!-- arrow 5 → 6 -->
  <path d="M365 405 L365 455" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Agent 7: customer comms (off to the side) -->
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="180" height="80" rx="10" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="130" y="343" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">AGENT 7</text>
    <text x="130" y="363" font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">CustomerComms</text>
    <text x="130" y="384" font-size="11" fill="#64748b" text-anchor="middle">Drafts customer follow-ups</text>
  </g>

  <!-- Human manager -->
  <g filter="url(#shadow)">
    <rect x="540" y="460" width="280" height="80" rx="10" fill="#0f172a"/>
    <text x="680" y="490" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">UNDERWRITING MANAGER</text>
    <text x="680" y="510" font-size="11" fill="#e2e8f0" text-anchor="middle">Approve · Reject · Conditional approve</text>
    <text x="680" y="526" font-size="11" fill="#e2e8f0" text-anchor="middle">Request more info · Escalate to committee</text>
  </g>

  <!-- arrow 6 → manager -->
  <line x1="465" y1="500" x2="535" y2="500" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <g transform="translate(40, 575)">
    <rect width="14" height="14" fill="url(#card)" stroke="#cbd5e1"/>
    <text x="22" y="11" font-size="11" fill="#475569">LLM agent</text>
    <rect x="100" width="14" height="14" fill="url(#gate)" stroke="#f59e0b"/>
    <text x="122" y="11" font-size="11" fill="#475569">Cost gate</text>
    <rect x="200" width="14" height="14" fill="url(#api)" stroke="#10b981"/>
    <text x="222" y="11" font-size="11" fill="#475569">External API call</text>
    <rect x="340" width="14" height="14" fill="url(#dash)" stroke="#6366f1"/>
    <text x="362" y="11" font-size="11" fill="#475569">Synthesis</text>
    <rect x="430" width="14" height="14" fill="#0f172a"/>
    <text x="452" y="11" font-size="11" fill="#475569">Human decision</text>
  </g>
</svg>
